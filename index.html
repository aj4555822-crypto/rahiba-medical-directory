<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل الرحيبة الطبي | عيادات، أطباء، صيدليات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #FAF8F4;
            --fg: #1B2A1B;
            --accent: #0E7C5F;
            --accent-dark: #095E47;
            --accent-light: #D6F0E5;
            --gold: #C4962C;
            --card: #FFFFFF;
            --border: #DDE3DD;
            --doctor: #2563EB;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'IBM Plex Sans Arabic', sans-serif; background: var(--bg); color: var(--fg); }
        h1, h2, h3 { font-family: 'Noto Kufi Arabic', sans-serif; }
        .hero-bg { background: linear-gradient(160deg, #0E7C5F 0%, #073D2E 100%); }
        .search-container { backdrop-filter: blur(20px); background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; transition: all 0.3s ease; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .badge-clinic { background: var(--accent-light); color: var(--accent-dark); }
        .badge-doctor { background: #DBEAFE; color: #1E40AF; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; items-center: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
    </style>
</head>
<body>

    <nav class="bg-[#073D2E] text-white py-4 px-6 sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="#" class="flex items-center gap-3 font-bold text-lg">
                <i class="fas fa-heartbeat text-amber-500"></i> دليل الرحيبة الطبي
            </a>
        </div>
    </nav>

    <header class="hero-bg pt-20 pb-16 px-4 text-white text-center">
        <div class="max-w-3xl mx-auto">
            <h1 class="text-3xl sm:text-4xl font-bold mb-4">الرعاية الصحية الأقرب إليك بالرحيبة</h1>
            <p class="text-white/70 text-sm mb-8">دليل طبي فوري محدث مباشرة عبر السحاب</p>
            
            <div class="search-container flex items-center gap-3 p-2 rounded-xl max-w-xl mx-auto">
                <i class="fas fa-search text-white/40 mr-2"></i>
                <input type="text" id="searchInput" oninput="filterData()" class="bg-transparent text-white outline-none w-full py-2 placeholder-white/50 text-sm" placeholder="ابحث باسم الدكتور، الاختصاص، أو العنوان...">
            </div>

            <div class="grid grid-cols-2 gap-4 max-w-sm mx-auto mt-8 text-sm">
                <div class="bg-white/5 p-3 rounded-lg border border-white/10">
                    <div class="text-xl font-bold count-doctors">0</div>
                    <div class="text-xs text-white/60">أطباء</div>
                </div>
                <div class="bg-white/5 p-3 rounded-lg border border-white/10">
                    <div class="text-xl font-bold count-clinics">0</div>
                    <div class="text-xs text-white/60">عيادات ومراكز</div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <div id="directoryGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-12 text-gray-500">
                <i class="fas fa-spinner fa-spin text-2xl mb-2 text-emerald-600"></i>
                <p>جاري سحب البيانات الحية من جدول جوجل...</p>
            </div>
        </div>
        <div id="noResults" class="hidden text-center py-12 text-gray-500">لم نجد نتائج تطابق بحثك.</div>
    </main>

    <div id="detailsModal" class="modal-overlay" onclick="closeModal()">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full relative m-4" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-4 left-4 text-gray-400 hover:text-gray-600"><i class="fas fa-times text-lg"></i></button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
    // البيانات موجودة هنا مباشرة - سريعة جداً ولا تحتاج إنترنت لفتح الشيت
    const medicalData = [
        { id: 1, name: "د. محمد علي جور", type: "doctor", specialty: "جراحة عامة", address: "كوع الضمير", phone: "98568456", hours: "من 9 ص - 2 م" },
        { id: 2, name: "د. محمد فايز طحطوح", type: "doctor", specialty: "أمراض جلدية", address: "جامع نور", phone: "85236552", hours: "من 4 م - 8 م" },
        { id: 3, name: "د. معتز إسماعيل", type: "doctor", specialty: "جراحة أسنان", address: "دخلة سلمى", phone: "98535842", hours: "من 10 ص - 6 م" },
        { id: 4, name: "مركز الرحيبة", type: "clinic", specialty: "جراحة أسنان", address: "طلعة البلدية", phone: "98785842", hours: "من 10 ص - 6 م" }
    ];

    // دالة عرض البيانات (نسخة مبسطة ومضمونة)
    function renderDirectory(data) {
        const grid = document.getElementById('directoryGrid');
        grid.innerHTML = '';
        data.forEach(item => {
            grid.innerHTML += `
                <div class="card p-5 cursor-pointer" onclick="openModal(${item.id})">
                    <h3 class="text-lg font-bold">${item.name}</h3>
                    <p class="text-sm text-emerald-700">${item.specialty}</p>
                    <p class="text-xs text-gray-500 mt-2">${item.address}</p>
                </div>
            `;
        });
    }

    // تشغيل عند التحميل
    document.addEventListener('DOMContentLoaded', () => renderDirectory(medicalData));

    function openModal(id) {
        const item = medicalData.find(d => d.id === id);
        alert(item.name + "\n" + item.phone); // تجربة سريعة للمودال
    }
</script>
