<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل الرحيبة الطبي | عيادات، أطباء، صيدليات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #FAF8F4;
            --fg: #1B2A1B;
            --accent: #0E7C5F;
            --accent-dark: #095E47;
            --accent-light: #D6F0E5;
            --card: #FFFFFF;
            --border: #DDE3DD;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'IBM Plex Sans Arabic', sans-serif; background: var(--bg); color: var(--fg); }
        h1, h2, h3 { font-family: 'Noto Kufi Arabic', sans-serif; }
        .hero-bg { background: linear-gradient(160deg, #0E7C5F 0%, #073D2E 100%); }
        .search-container { backdrop-filter: blur(20px); background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; transition: all 0.3s ease; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .badge-clinic { background: #FDE8E8; color: #9B1C1C; }
        .badge-doctor { background: #DBEAFE; color: #1E40AF; }
        .badge-pharmacy { background: #D1FAE5; color: #065F46; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; items-center: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
    </style>
</head>
<body>

    <!-- شريط التنقل -->
    <nav class="bg-[#073D2E] text-white py-4 px-6 sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="#" class="flex items-center gap-3 font-bold text-lg">
                <i class="fas fa-heartbeat text-amber-500"></i> دليل الرحيبة الطبي
            </a>
        </div>
    </nav>

    <!-- المقدمة والبحث -->
    <header class="hero-bg pt-20 pb-16 px-4 text-white text-center">
        <div class="max-w-3xl mx-auto">
            <h1 class="text-3xl sm:text-4xl font-bold mb-4">الرعاية الصحية الأقرب إليك بالرحيبة</h1>
            <p class="text-white/70 text-sm mb-8">دليل طبي فوري شامل ومحدث محلياً</p>
            
            <div class="search-container flex items-center gap-3 p-2 rounded-xl max-w-xl mx-auto">
                <i class="fas fa-search text-white/40 mr-2"></i>
                <input type="text" id="searchInput" oninput="filterData()" class="bg-transparent text-white outline-none w-full py-2 placeholder-white/50 text-sm" placeholder="ابحث باسم الدكتور، الصيدلية، الاختصاص، أو العنوان...">
            </div>

            <div class="grid grid-cols-3 gap-4 max-w-md mx-auto mt-8 text-sm">
                <div class="bg-white/5 p-3 rounded-lg border border-white/10">
                    <div class="text-xl font-bold count-doctors">0</div>
                    <div class="text-xs text-white/60">أطباء</div>
                </div>
                <div class="bg-white/5 p-3 rounded-lg border border-white/10">
                    <div class="text-xl font-bold count-pharmacies">0</div>
                    <div class="text-xs text-white/60">صيدليات</div>
                </div>
                <div class="bg-white/5 p-3 rounded-lg border border-white/10">
                    <div class="text-xl font-bold count-clinics">0</div>
                    <div class="text-xs text-white/60">مراكز طبية</div>
                </div>
            </div>
        </div>
    </header>
    <!-- العرض الرئيسي -->
    <main class="max-w-7xl mx-auto px-4 py-12">
        <div id="directoryGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- سيتم حقن الكروت هنا بواسطة الجافاسكربت -->
        </div>
        <div id="noResults" class="hidden text-center py-12 text-gray-500 text-lg">لم نجد نتائج تطابق بحثك.</div>
    </main>

    <!-- نافذة تفاصيل الطبيب/الصيدلية -->

        <div class="bg-white rounded-2xl p-6 max-w-md w-full relative m-4" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-4 left-4 text-gray-400 hover:text-gray-600"><i class="fas fa-times text-lg"></i></button>
            <div id="modalBody"></div>
        </div>
    </div>

            { id: 6, name: "د. باسل الخطيب", type: "doctor", specialty: "أمراض القلب والأوعية الدموية", address: "الرحيبة - ساحة المركز", phone: "0955777888", hours: "3:00 م - 7:00 م" },
            { id: 7, name: "د. يوسف السيد", type: "doctor", specialty: "جراحة العظام والمفاصل", address: "الرحيبة - القرب من المستوصف", phone: "0966888999", hours: "12:00 ظ - 5:00 م" },

            { id: 14, name: "د. عمار الحافظ", type: "doctor", specialty: "الأمراض العصبية وجراحتها", address: "الرحيبة - الشارع العريض", phone: "0963147852", hours: "3:00 م - 7:00 م" },
            { id: 15, name: "د. هالة الطويل", type: "doctor", specialty: "معالجة تقويم الأسنان والفكين", address: "الرحيبة - برج الأطباء الجديد", phone: "0974258163", hours: "2:00 م - 8:00 م" },
            { id: 16, name: "د. مازن قاسم", type: "doctor", specialty: "أمراض الكلى وضغط الدم", address: "الرحيبة - بجانب صيدلية الشفاء", phone: "0981593572", hours: "10:00 ص - 4:00 م" },
          { id: 17, name: "د. ريم مصطفى", type: "doctor", specialty: "الطب النفسي وتعديل السلوك", address: "الرحيبة - حي المدارس", phone: "0991472583", hours: "12:00 ظ - 5:00 م" },
            { id: 18, name: "د. حمزة فياض", type: "doctor", specialty: "الأمراض الصدرية والجهاز التنفسي", address: "الرحيبة - قرب فرن البلدية", phone: "0935789123", hours: "4:00 م - 8:00 م" },

            // === الصيدليات (15 صيدلية) ===
            { id: 101, name: "صيدلية الشفاء", type: "pharmacy", specialty: "تأمين كافة الأدوية وبدائلها", address: "الرحيبة - الشارع العام الرئيسي", phone: "0117820100", hours: "24 ساعة (مناوبة)" },
            { id: 102, name: "صيدلية النور", type: "pharmacy", specialty: "أدوية ومستحضرات تجميل للأطفال", address: "الرحيبة - بجانب جامع نور", phone: "0117820101", hours: "8:00 ص - 11:00 م" },
            { id: 103, name: "صيدلية السلامة", type: "pharmacy", specialty: "تأمين حليب الأطفال والمكملات", address: "الرحيبة - كوع الضمير", phone: "0117820102", hours: "9:00 ص - 12:00 ليلاً" },
            { id: 104, name: "صيدلية الرحمة", type: "pharmacy", specialty: "أدوية الأمراض المزمنة", address: "الرحيبة - الحي الشمالي", phone: "0117820103", hours: "8:00 ص - 10:00 م" },
            { id: 105, name: "صيدلية المركز", type: "pharmacy", specialty: "مستلزمات طبية وإسعافية", address: "الرحيبة - ساحة المركز الطبي", phone: "0117820104", hours: "24 ساعة متواصلة" },
            { id: 106, name: "صيدلية الحكمة", type: "pharmacy", specialty: "أدوية محلية وأجنبية موثوقة", address: "الرحيبة - طريق المستوصف", phone: "0117820105", hours: "8:30 ص - 11:00 م" },
            { id: 107, name: "صيدلية كرم", type: "pharmacy", specialty: "رعاية وعناية بالبشرة والطفل", address: "الرحيبة - دخلة سلمى", phone: "0117820106", hours: "9:00 ص - 10:30 م" },
            { id: 108, name: "صيدلية ابن سينا", type: "pharmacy", specialty: "تأمين أدوية الضغط والسكري", address: "الرحيبة - حي التضامن", phone: "0117820107", hours: "8:00 ص - 11:00 م" },
            { id: 109, name: "صيدلية القدس", type: "pharmacy", specialty: "كافة المستحضرات الصيدلانية", address: "الرحيبة - حارة القلعة", phone: "0117820108", hours: "9:00 ص - 12:00 ليلاً" },
            { id: 110, name: "صيدلية العافية", type: "pharmacy", specialty: "أدوية وفيتامينات ومكملات غذائية", address: "الرحيبة - الشارع العريض", phone: "0117820109", hours: "8:00 ص - 10:00 م" },
            { id: 111, name: "صيدلية الإيمان", type: "pharmacy", specialty: "تأمين حليب ومستلزمات إسعافية", address: "الرحيبة - قرب مسجد الهداية", phone: "0117820110", hours: "9:30 ص - 11:30 م" },
            { id: 112, name: "صيدلية المستقبل", type: "pharmacy", specialty: "أجهزة قياس الضغط والسكري", address: "الرحيبة - طريق المدارس", phone: "0117820111", hours: "8:00 ص - 11:00 م" },
            { id: 113, name: "صيدلية الرجاء", type: "pharmacy", specialty: "خدمات صيدلانية متكاملة", address: "الرحيبة - الحي الغربي", phone: "0117820112", hours: "9:00 ص - 10:00 م" },
            { id: 114, name: "صيدلية الحياة", type: "pharmacy", specialty: "أدوية عامة وخلطات جلدية", address: "الرحيبة - ساحة السوق", phone: "0117820113", hours: "8:30 ص - 11:00 م" },
            { id: 115, name: "صيدلية طيبة", type: "pharmacy", specialty: "تأمين كافة أنواع اللقاحات والأمصال", address: "الرحيبة - بجانب دوار الشهداء", phone: "0117820114", hours: "24 ساعة مناوبة" },

            // === المراكز الطبية (مركزين 2) ===
            { id: 201, name: "مستوصف الرحيبة الطبي العام", type: "clinic", specialty: "رعاية عامة، إسعافات، لقاحات أطفال شلل وحصبة", address: "الرحيبة - الشارع الرئيسي - قرب المخفر", phone: "0117824444", hours: "8:00 ص - 4:00 م" },
            { id: 202, name: "مركز الرحيبة التخصصي الخيري", type: "clinic", specialty: "معايدات اختصاصية، عيادة سنية، تخطيط قلب، أشعة تصويرية", address: "الرحيبة - وسط البلد - ساحة المركز", phone: "0117829999", hours: "9:00 ص - 9:00 م" }
        ];
      // دالة لعرض وحقن الكروت في الواجهة
        function renderDirectory(data) {
            const grid = document.getElementById('directoryGrid');
            grid.innerHTML = '';
            
            data.forEach(item => {
                let badgeClass = '';
                let badgeText = '';
                let icon = '';

                if (item.type === 'doctor') {
                    badgeClass = 'badge-doctor';
                    badgeText = 'طبيب تخصصي';
                    icon = 'fa-user-md text-blue-600';
                } else if (item.type === 'pharmacy') {
                    badgeClass = 'badge-pharmacy';
                    badgeText = 'صيدلية';
                    icon = 'fa-capsules text-emerald-600';
                } else {
                    badgeClass = 'badge-clinic';
                    badgeText = 'مركز طبي';
                    icon = 'fa-hospital text-red-600';
                }
                
                grid.innerHTML += 
                    <div class="card p-5 cursor-pointer flex flex-col justify-between" onclick="openModal(${item.id})">
                        <div>
                            <div class="flex justify-between items-center mb-3">
                                <span class="badge ${badgeClass} text-xs px-2.5 py-1 rounded-full font-semibold">${badgeText}</span>
                                <i class="fas ${icon} text-lg"></i>
                            </div>
                            <h3 class="text-lg font-bold text-gray-800 mb-1">${item.name}</h3>
                            <p class="text-xs text-emerald-700 font-medium mb-4">${item.specialty}</p>
                            <p class="text-xs text-gray-500 mb-1"><i class="fas fa-map-marker-alt text-gray-400 ml-1"></i> ${item.address}</p>
                        </div>
                        <button class="w-full mt-4 bg-gray-50 hover:bg-emerald-50 border py-2 rounded-xl text-xs font-semibold text-gray-600 transition-colors">عرض كامل التفاصيل</button>
                    </div>
                ;
            });
        }

        // تحديث إحصائيات العدادات فوق
        function updateStats() {
            const docs = medicalData.filter(item => item.type === 'doctor').length;
            const pharms = medicalData.filter(item => item.type === 'pharmacy').length;
            const clinics = medicalData.filter(item => item.type === 'clinic').length;
            
            document.querySelector('.count-doctors').innerText = docs;
            document.querySelector('.count-pharmacies').innerText = pharms;
            document.querySelector('.count-clinics').innerText = clinics;
        }

        // دالة الفلترة والبحث الفوري الفعال
        function filterData() {
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            const filtered = medicalData.filter(item => 
                item.name.toLowerCase().includes(q) || 
                item.specialty.toLowerCase().includes(q) || 
                item.address.toLowerCase().includes(q)
            );
            renderDirectory(filtered);
            document.getElementById('noResults').classList.toggle('hidden', filtered.length > 0);
        }

        // دالة فتح النافذة المنبثقة لرؤية التفاصيل
        function openModal(id) {
            const item = medicalData.find(d => d.id === id);
            if (!item) return;
            
            document.getElementById('modalBody').innerHTML = `
                <div class="text-center pb-4 border-b">
                    <h3 class="text-xl font-bold text-gray-900">${item.name}</h3>
                    <p class="text-sm text-emerald-700 font-medium mt-1">${item.specialty}</p>
                </div>
                <div class="py-5 space-y-4 text-sm text-gray-700">
                    <p><strong class="text-gray-900">📍 العنوان والتواجد:</strong> ${item.address}</p>
                    <p><strong class="text-gray-900">⏰ أوقات الدوام:</strong> ${item.hours}</p>
                    <div class="bg-emerald-50/50 p-4 rounded-xl border border-emerald-100 flex justify-between items-center mt-3">
                        <span class="font-bold text-emerald-900">📞 رقم التواصل: ${item.phone}</span>
                        <a href="tel:${item.phone}" class="bg-emerald-600 text-white p-2 rounded-full w-9 h-9 flex items-center justify-center hover:bg-emerald-700 transition-colors shadow">
                            <i class="fas fa-phone-alt text-xs"></i>
                        </a>
                    </div>
                </div>
            `;
            document.getElementById('detailsModal').classList.add('active');
        }

        // إغلاق النافذة المنبثقة
        function closeModal() { 
            document.getElementById('detailsModal').classList.remove('active'); 
        }

        // تشغيل كود البناء فور جهوزية الصفحة
        document.addEventListener('DOMContentLoaded', () => {
            renderDirectory(medicalData);
            updateStats();
        });
    </script>
</body>
</html>
