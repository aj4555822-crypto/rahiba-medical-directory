<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل الرحيبة الطبي | لوحة تحكم ديناميكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@200;400;600;800;900&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #FAF8F4; --bg-deep: #F0EDE6; --fg: #1B2A1B; --fg-light: #3D4F3D; --muted: #7A8B7A;
            --accent: #0E7C5F; --accent-dark: #095E47; --accent-light: #D6F0E5; --gold: #C4962C; --gold-light: #F5ECD0;
            --card: #FFFFFF; --border: #DDE3DD; --clinic: #0E7C5F; --doctor: #2563EB; --pharmacy: #C4962C;
            --center: #9333EA; --lab: #DC2626; --hospital: #EF4444;
        }
        body { font-family: 'IBM Plex Sans Arabic', sans-serif; background: var(--bg); color: var(--fg); overflow-x: hidden; }
        h1, h2, h3, h4, h5 { font-family: 'Noto Kufi Arabic', sans-serif; }
        .hero-bg { position: relative; overflow: hidden; background: linear-gradient(160deg, #0E7C5F 0%, #095E47 40%, #073D2E 100%); }
        .search-container { backdrop-filter: blur(20px); background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); transition: all 0.4s ease; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; transition: all 0.4s cubic-bezier(0.4,0,0.2,1); position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; right: 0; width: 4px; height: 0; transition: height 0.4s ease; border-radius: 0 0 4px 0; }
        .card:hover::before { height: 100%; }
        .card:hover { transform: translateY(-6px); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1); border-color: transparent; }
        .card.hospital-card::before { background: var(--hospital); }
        .card.clinic-card::before { background: var(--clinic); }
        .card.doctor-card::before { background: var(--doctor); }
        .card.pharmacy-card::before { background: var(--pharmacy); }
        .card.center-card::before { background: var(--center); }
        .card.lab-card::before { background: var(--lab); }
        .badge { font-size: 0.7rem; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
        .badge-hospital { background: #FEE2E2; color: #991B1B; }
        .badge-clinic { background: var(--accent-light); color: var(--accent-dark); }
        .badge-doctor { background: #DBEAFE; color: #1E40AF; }
        .badge-pharmacy { background: var(--gold-light); color: #92610A; }
        .badge-center { background: #F3E8FF; color: #6B21A8; }
        .badge-lab { background: #FEE2E2; color: #991B1B; }
        .cat-icon { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
        .cat-icon-hospital { background: #FEE2E2; color: var(--hospital); }
        .cat-icon-clinic { background: var(--accent-light); color: var(--accent); }
        .cat-icon-doctor { background: #DBEAFE; color: #2563EB; }
        .cat-icon-pharmacy { background: var(--gold-light); color: var(--gold); }
        .cat-icon-center { background: #F3E8FF; color: #9333EA; }
        .cat-icon-lab { background: #FEE2E2; color: #DC2626; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--fg); color: white; padding: 14px 28px; border-radius: 12px; font-size: 0.9rem; z-index: 9999; opacity: 0; transition: all 0.4s ease; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--card); border-radius: 20px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; }
        .filters-scroll::-webkit-scrollbar { display: none; }
        .detail-row { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--muted); }
        .detail-row i { width: 16px; text-align: center; font-size: 0.75rem; }
    </style>
</head>
<body>

    <nav class="navbar fixed top-0 right-0 left-0 z-40 bg-[#073D2E] shadow-md" id="navbar">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16 sm:h-20">
                <a href="#" class="flex items-center gap-3 text-white no-underline">
                    <div class="w-10 h-10 rounded-xl bg-white/15 flex items-center justify-center border border-white/20">
                        <i class="fas fa-heartbeat text-lg" style="color: var(--gold)"></i>
                    </div>
                    <div>
                        <div class="text-base sm:text-lg font-bold leading-tight">دليل الرحيبة الطبي</div>
                        <div class="text-[10px] opacity-60">لوحة تحكم تفاعلية ذكية</div>
                    </div>
                </a>
                <div class="flex items-center gap-4">
                    <button onclick="toggleAdminPanel()" class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-xl text-xs sm:text-sm font-bold shadow-md transition-all flex items-center gap-2">
                        <i class="fas fa-sliders-h"></i> لوحة التحكم
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <section id="home" class="hero-bg pt-32 pb-20 relative">
        <div class="max-w-7xl mx-auto px-4 text-center relative z-10">
            <h1 class="text-3xl sm:text-5xl font-black text-white mb-4">دليلك الطبي المرن في الرحيبة</h1>
            <p class="text-white/70 text-sm sm:text-base mb-8 max-w-xl mx-auto">أضف، عدّل، وتحكّم بجميع العيادات والمستشفيات والصيدليات فوراً وبدون لمس الكود.</p>
            <div class="search-container rounded-2xl p-2 max-w-2xl mx-auto flex items-center gap-2">
                <div class="flex-1 flex items-center gap-3 px-4">
                    <i class="fas fa-search text-white/40"></i>
                    <input type="text" id="heroSearch" class="bg-transparent text-white outline-none w-full py-3 text-sm" placeholder="ابحث عن أي شيء..." oninput="handleSearch(this.value)">
                </div>
            </div>
        </div>
    </section>

    <section class="py-4 sticky top-16 sm:top-20 z-30 bg-white border-b border-gray-200 shadow-sm overflow-x-auto filters-scroll">
        <div class="max-w-7xl mx-auto px-4 flex gap-2">
            <button class="filter-btn active bg-emerald-700 text-white px-4 py-2 rounded-xl text-xs font-semibold" onclick="setFilter('all', this)">الكل</button>
            <button class="filter-btn bg-gray-100 text-gray-700 px-4 py-2 rounded-xl text-xs font-semibold" onclick="setFilter('hospital', this)">المستشفيات</button>
            <button class="filter-btn bg-gray-100 text-gray-700 px-4 py-2 rounded-xl text-xs font-semibold" onclick="setFilter('center', this)">المراكز الطبية</button>
            <button class="filter-btn bg-gray-100 text-gray-700 px-4 py-2 rounded-xl text-xs font-semibold" onclick="setFilter('lab', this)">المخابر</button>
            <button class="filter-btn bg-gray-100 text-gray-700 px-4 py-2 rounded-xl text-xs font-semibold" onclick="setFilter('doctor', this)">الأطباء</button>
            <button class="filter-btn bg-gray-100 text-gray-700 px-4 py-2 rounded-xl text-xs font-semibold" onclick="setFilter('pharmacy', this)">الصيدليات</button>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-4 py-10">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="dataGrid">
            </div>
        <div id="noResults" class="hidden text-center py-20">
            <i class="fas fa-folder-open text-5xl text-gray-300 mb-3"></i>
            <p class="text-gray-500">لا يوجد بيانات مضافة في هذا القسم حالياً.</p>
        </div>
    </main>

    <div id="adminPanel" class="fixed inset-0 bg-black/60 z-50 backdrop-blur-sm hidden items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto p-6 shadow-2xl relative">
            <button onclick="toggleAdminPanel()" class="absolute top-4 left-4 text-gray-400 hover:text-gray-600 text-xl"><i class="fas fa-times"></i></button>
            <h2 class="text-xl font-bold border-b pb-3 mb-4 text-emerald-800"><i class="fas fa-tools ml-2"></i>لوحة إدارة محتوى الدليل الطبية</h2>
            
            <form id="itemForm" onsubmit="handleFormSubmit(event)" class="space-y-4">
                <input type="hidden" id="editId">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold mb-1">النوع</label>
                        <select id="itemType" required class="w-full border p-2.5 rounded-xl text-sm bg-gray-50">
                            <option value="hospital">مستشفى (قيد التطوير / جاهز)</option>
                            <option value="center">مركز طبي</option>
                            <option value="lab">مخبر تحاليل</option>
                            <option value="doctor">طبيب مختص</option>
                            <option value="pharmacy">صيدلية</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1">الاسم</label>
                        <input type="text" id="itemName" required class="w-full border p-2.5 rounded-xl text-sm" placeholder="مثال: مخبر ظاهر، د. أحمد...">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold mb-1">الاختصاص / الحالة</label>
                        <input type="text" id="itemSpecialty" required class="w-full border p-2.5 rounded-xl text-sm" placeholder="مثال: قيد التطوير، جراحة عظام، صيدلية مناوبة...">
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1">رقم الهاتف أو الجوال</label>
                        <input type="text" id="itemPhone" required class="w-full border p-2.5 rounded-xl text-sm text-left" dir="ltr" placeholder="09XXXXXXXX">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold mb-1">العنوان أو موقع العيادة</label>
                        <input type="text" id="itemAddress" required class="w-full border p-2.5 rounded-xl text-sm" placeholder="مثال: الشارع العام، بجانب صيدلية الشفاء...">
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1">أوقات أو ساعات الدوام</label>
                        <input type="text" id="itemHours" required class="w-full border p-2.5 rounded-xl text-sm" placeholder="مثال: 24 ساعة، من 4م لـ 9م...">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold mb-1">وصف قصير أو معلومات إضافية</label>
                    <textarea id="itemDesc" rows="2" class="w-full border p-2.5 rounded-xl text-sm resize-none" placeholder="اكتب ميزات إضافية، الخدمات المتاحة..."></textarea>
                </div>

                <div class="flex items-center justify-end gap-2 pt-2 border-t">
                    <button type="button" onclick="resetForm()" class="bg-gray-100 text-gray-600 px-4 py-2 rounded-xl text-sm font-semibold">إلغاء التعديل</button>
                    <button type="submit" class="bg-emerald-600 text-white px-6 py-2 rounded-xl text-sm font-bold shadow-md hover:bg-emerald-700">حفظ البيانات</button>
                </div>
            </form>

            <div class="mt-8">
                <h3 class="font-bold text-sm text-gray-700 mb-3 border-b pb-1">العناصر المضافة حالياً في قاعدة البيانات</h3>
                <div class="overflow-x-auto max-h-60 border rounded-xl">
                    <table class="w-full text-sm text-right">
                        <thead class="bg-gray-50 text-xs font-bold text-gray-500 border-b">
                            <tr>
                                <th class="p-3">الاسم</th>
                                <th class="p-3">النوع</th>
                                <th class="p-3">الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="adminTableBody" class="divide-y">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal-content p-6 max-w-md mx-auto relative bg-white rounded-2xl shadow-xl" id="modalContent" onclick="event.stopPropagation()"></div>
    </div>
    <div class="toast" id="toast"></div>

<script>
    // ===== داتا تجريبية مبدئية لتبدأ بها فوراً بحسب الأعداد الجديدة =====
    const defaultData = [
        { id: 1, type: "hospital", name: "مستشفى الرحيبة العام", specialty: "قيد التطوير والإنشاء والتجهيز", address: "مدخل مدينة الرحيبة الشرقي", phone: "غير متوفر حالياً", hours: "خلال الفترة القادمة", description: "المشروع الطبي الأكبر لخدمة أهالي المنطقة بكافة التخصصات الطبية الجراحية والإسعافية.", rating: 5 },
        { id: 2, type: "lab", name: "مخبر الشفاء للتحاليل الطبية", specialty: "تحاليل دم شاملة وكيمياء", address: "الشارع الرئيسي - وسط المدينة", phone: "011-5550041", hours: "7:30 ص - 8:00 م", description: "أحدث الأجهزة المخبرية لنتائج دقيقة وسريعة.", rating: 4.8 },
        { id: 3, type: "lab", name: "مخبر ظاهر للتحاليل", specialty: "هرمونات ومناعة وباثولوجيا", address: "شارع المستشفى - فوق صيدلية الأمل", phone: "011-5550042", hours: "8:00 ص - 7:00 م", description: "فحوصات دورية شاملة وسحب عينات منزلي.", rating: 4.7 },
        { id: 4, type: "pharmacy", name: "صيدلية الشفاء الأولى", specialty: "خدمة ليلية متوفرة", address: "ساحة المدينة الرئيسية", phone: "0933111222", hours: "24 ساعة على مدار الأسبوع", description: "تأمين كافة أنواع الأدوية المزمنة وحليب الأطفال.", rating: 4.6 }
    ];

    // استدعاء البيانات المخزنة بمتصفح المستخدم أو جلب الافتراضية إذا كانت فارغة
    let medicalData = JSON.parse(localStorage.getItem('rahiba_medical_db')) || defaultData;
    let currentFilter = 'all';
    let searchQuery = '';

    // ===== دالة الحفظ التلقائي في المتصفح لمنع ضياع البيانات عند التحديث =====
    function saveToStorage() {
        localStorage.setItem('rahiba_medical_db', JSON.stringify(medicalData));
    }

    // ===== بناء البطاقات الطبية تلقائياً =====
    function renderApp() {
        const grid = document.getElementById('dataGrid');
        const filtered = medicalData.filter(item => {
            if (currentFilter !== 'all' && item.type !== currentFilter) return false;
            if (!searchQuery) return true;
            const q = searchQuery.toLowerCase();
            return item.name.toLowerCase().includes(q) || item.specialty.toLowerCase().includes(q) || (item.description && item.description.toLowerCase().includes(q));
        });

        if(filtered.length === 0) {
            grid.innerHTML = '';
            document.getElementById('noResults').classList.remove('hidden');
            return;
        }
        document.getElementById('noResults').classList.add('hidden');

        const typeMap = {
            hospital: { card: 'hospital-card', badge: 'badge-hospital', icon: 'fa-hospital-user', color: 'var(--hospital)', label: 'مستشفى' },
            center: { card: 'center-card', badge: 'badge-center', icon: 'fa-clinic-medical', color: 'var(--center)', label: 'مركز طبي' },
            lab: { card: 'lab-card', badge: 'badge-lab', icon: 'fa-flask', color: 'var(--lab)', label: 'مخبر' },
            doctor: { card: 'doctor-card', badge: 'badge-doctor', icon: 'fa-user-md', color: 'var(--doctor)', label: 'طبيب مختص' },
            pharmacy: { card: 'pharmacy-card', badge: 'badge-pharmacy', icon: 'fa-pills', color: 'var(--pharmacy)', label: 'صيدلية' }
        };

        grid.innerHTML = filtered.map(item => {
            const t = typeMap[item.type] || typeMap.clinic;
            return `
                <div class="card ${t.card} p-5 cursor-pointer" onclick="openModal(${item.id})">
                    <div class="flex justify-between items-start mb-3">
                        <span class="badge ${t.badge}">${t.label}</span>
                        <span class="text-xs font-bold text-amber-500"><i class="fas fa-star ml-1"></i>${item.rating || '4.5'}</span>
                    </div>
                    <div class="flex items-start gap-3 mb-4">
                        <div class="cat-icon" style="background-color: ${t.color}20; color: ${t.color}"><i class="fas ${t.icon}"></i></div>
                        <div>
                            <h3 class="font-bold text-sm text-gray-800">${item.name}</h3>
                            <p class="text-xs font-semibold" style="color: ${t.color}">${item.specialty}</p>
                        </div>
                    </div>
                    <div class="space-y-1.5 mb-4 text-xs text-gray-500">
                        <div class="detail-row"><i class="fas fa-map-marker-alt"></i><span>${item.address}</span></div>
                        <div class="detail-row"><i class="fas fa-clock"></i><span>${item.hours}</span></div>
                    </div>
                    <a href="tel:${item.phone}" onclick="event.stopPropagation()" class="w-full block py-2 rounded-xl text-center text-xs font-bold text-white transition-all shadow-sm" style="background-color: ${t.color}">
                        <i class="fas fa-phone-alt ml-1"></i> اتصال ${item.phone}
                    </a>
                </div>
            `;
        }).join('');

        renderAdminTable();
    }

    // ===== تحديث جدول لوحة التحكم الخاص بالمسؤول =====
    function renderAdminTable() {
        const tbody = document.getElementById('adminTableBody');
        tbody.innerHTML = medicalData.map(item => `
            <tr class="hover:bg-gray-50">
                <td class="p-3 font-semibold text-xs">${item.name}</td>
                <td class="p-3 text-xs text-gray-500">${item.type}</td>
                <td class="p-3 space-x-2 space-x-reverse">
                    <button onclick="editItem(${item.id})" class="text-blue-600 hover:text-blue-800 font-bold text-xs"><i class="fas fa-edit"></i> تعديل</button>
                    <button onclick="deleteItem(${item.id})" class="text-red-600 hover:text-red-800 font-bold text-xs"><i class="fas fa-trash"></i> حذف</button>
                </td>
            </tr>
        `).join('');
    }

    // ===== معالجة إضافة وتعديل البيانات التلقائي =====
    function handleFormSubmit(e) {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        const newItem = {
            id: id ? parseInt(id) : Date.now(),
            type: document.getElementById('itemType').value,
            name: document.getElementById('itemName').value,
            specialty: document.getElementById('itemSpecialty').value,
            phone: document.getElementById('itemPhone').value,
            address: document.getElementById('itemAddress').value,
            hours: document.getElementById('itemHours').value,
            description: document.getElementById('itemDesc').value,
            rating: id ? medicalData.find(x => x.id === parseInt(id)).rating : (Math.random() * (5 - 4) + 4).toFixed(1)
        };

        if (id) {
            // كود التعديل الفوري
            const index = medicalData.findIndex(x => x.id === parseInt(id));
            medicalData[index] = newItem;
            showToast("تم تحديث البيانات بنجاح!");
        } else {
            // كود الإضافة الجديدة
            medicalData.push(newItem);
            showToast("تم إضافة المنشأة الطبية الجديدة للدليل!");
        }

        saveToStorage();
        resetForm();
        renderApp();
    }

    // ===== تفعيل وضع تعديل منشأة قائمة =====
    function editItem(id) {
        const item = medicalData.find(x => x.id === id);
        if (!item) return;
        document.getElementById('editId').value = item.id;
        document.getElementById('itemType').value = item.type;
        document.getElementById('itemName').value = item.name;
        document.getElementById('itemSpecialty').value = item.specialty;
        document.getElementById('itemPhone').value = item.phone;
        document.getElementById('itemAddress').value = item.address;
        document.getElementById('itemHours').value = item.hours;
        document.getElementById('itemDesc').value = item.description || '';
        showToast("أنت الآن في وضع تعديل: " + item.name);
    }

    // ===== حذف عنصر نهائياً من الدليل =====
    function deleteItem(id) {
        if(confirm("هل أنت متأكد تماماً من حذف هذا العنصر النهائي من دليل الرحيبة؟")) {
            medicalData = medicalData.filter(x => x.id !== id);
            saveToStorage();
            renderApp();
            showToast("تم الحذف بنجاح.");
        }
    }

    // ===== دوال مساعدة للتحكم بالواجهة والبحث والـ Modals =====
    function resetForm() { document.getElementById('itemForm').reset(); document.getElementById('editId').value = ''; }
    function toggleAdminPanel() { document.getElementById('adminPanel').classList.toggle('hidden'); document.getElementById('adminPanel').classList.toggle('flex'); }
    function handleSearch(val) { searchQuery = val.trim(); renderApp(); }
    function setFilter(filter, btn) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(b => { b.classList.remove('bg-emerald-700', 'text-white'); b.classList.add('bg-gray-100', 'text-gray-700'); });
        btn.classList.add('bg-emerald-700', 'text-white'); btn.classList.remove('bg-gray-100', 'text-gray-700');
        renderApp();
    }
    function openModal(id) {
        const item = medicalData.find(x => x.id === id); if(!item) return;
        document.getElementById('modalContent').innerHTML = `
            <button onclick="closeModal()" class="absolute top-4 left-4 text-gray-400 hover:text-gray-600"><i class="fas fa-times text-lg"></i></button>
            <h3 class="font-bold text-lg text-emerald-800 mb-2">${item.name}</h3>
            <p class="text-xs font-bold text-gray-500 mb-4">${item.specialty}</p>
            <p class="text-sm text-gray-700 leading-relaxed mb-5">${item.description || 'لا يوجد تفاصيل تفصيلية مضافة حالياً.'}</p>
            <div class="space-y-2 text-xs border-t pt-4">
                <div><strong>الموقع والعنوان:</strong> ${item.address}</div>
                <div><strong>أوقات التواجد:</strong> ${item.hours}</div>
                <div><strong>رقم التواصل السريع:</strong> ${item.phone}</div>
            </div>
        `;
        document.getElementById('modalOverlay').classList.add('active');
    }
    function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
    function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

    // تشغيل التطبيق وجلب الداتا عند أول تحميل للموقع
    document.addEventListener('DOMContentLoaded', renderApp);
</script>
</body>
</html>
