<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل الرحيبة الطبي | عيادات، أطباء، صيدليات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #FAF8F4;
            --fg: #1B2A1B;
            --accent: #0E7C5F;
            --accent-dark: #095E47;
            --accent-light: #D6F0E5;
            --gold: #C4962C;
            --card: #FFFFFF;
            --border: #DDE3DD;
            --doctor: #2563EB;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'IBM Plex Sans Arabic', sans-serif; background: var(--bg); color: var(--fg); }
        h1, h2, h3 { font-family: 'Noto Kufi Arabic', sans-serif; }
        .hero-bg { background: linear-gradient(160deg, #0E7C5F 0%, #073D2E 100%); }
        .search-container { backdrop-filter: blur(20px); background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; transition: all 0.3s ease; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .badge-clinic { background: var(--accent-light); color: var(--accent-dark); }
        .badge-doctor { background: #DBEAFE; color: #1E40AF; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; items-center: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
    </style>
</head>
<body>

    <nav class="bg-[#073D2E] text-white py-4 px-6 sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="#" class="flex items-center gap-3 font-bold text-lg">
                <i class="fas fa-heartbeat text-amber-500"></i> دليل الرحيبة الطبي
            </a>
        </div>
    </nav>

    <header class="hero-bg pt-20 pb-16 px-4 text-white text-center">
        <div class="max-w-3xl mx-auto">
            <h1 class="text-3xl sm:text-4xl font-bold mb-4">الرعاية الصحية الأقرب إليك بالرحيبة</h1>
            <p class="text-white/70 text-sm mb-8">دليل طبي فوري محدث مباشرة عبر السحاب</p>
            
            <div class="search-container flex items-center gap-3 p-2 rounded-xl max-w-xl mx-auto">
                <i class="fas fa-search text-white/40 mr-2"></i>
                <input type="text" id="searchInput" oninput="filterData()" class="bg-transparent text-white outline-none w-full py-2 placeholder-white/50 text-sm" placeholder="ابحث باسم الدكتور، الاختصاص، أو العنوان...">
            </div>

            <div class="grid grid-cols-2 gap-4 max-w-sm mx-auto mt-8 text-sm">
                <div class="bg-white/5 p-3 rounded-lg border border-white/10">
                    <div class="text-xl font-bold count-doctors">0</div>
                    <div class="text-xs text-white/60">أطباء</div>
                </div>
                <div class="bg-white/5 p-3 rounded-lg border border-white/10">
                    <div class="text-xl font-bold count-clinics">0</div>
                    <div class="text-xs text-white/60">عيادات ومراكز</div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <div id="directoryGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-12 text-gray-500">
                <i class="fas fa-spinner fa-spin text-2xl mb-2 text-emerald-600"></i>
                <p>جاري سحب البيانات الحية من جدول جوجل...</p>
            </div>
        </div>
        <div id="noResults" class="hidden text-center py-12 text-gray-500">لم نجد نتائج تطابق بحثك.</div>
    </main>

    <div id="detailsModal" class="modal-overlay" onclick="closeModal()">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full relative m-4" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-4 left-4 text-gray-400 hover:text-gray-600"><i class="fas fa-times text-lg"></i></button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
    
const sheetId = '10r8nD3YOCX93I9GQIxK0DCsLFY0nTGxEVHzRts2E0ao';


const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=0`;

        let medicalData = [];

        async function fetchSpreadsheetData() {
            const grid = document.getElementById('directoryGrid');
            try {
                // إضافة خيار cache لتحديث البيانات فوراً عند تعديل الشيت
                const response = await fetch(csvUrl, { cache: "no-store" });
                if (!response.ok) throw new Error("فشل في قراءة ملف جوجل");
                
                const text = await response.text();
                
                // تفكيك أسطر الـ CSV
                const lines = text.split('\n');
                if (lines.length < 2) {
                    grid.innerHTML = `<div class="col-span-full text-center text-amber-600 p-6 bg-amber-50 rounded-xl border border-amber-200">الجدول فارغ! تأكد من تعبئة البيانات تحت الأسماء.</div>`;
                    return;
                }

                // قراءة وتنظيف أسماء الأعمدة من السطر الأول
                const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim().toLowerCase());
                
                medicalData = [];
                // حلقة لمعالجة البيانات
                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;
                    
                    // تقسيم السطر مع مراعاة الفواصل بداخل علامات التنصيص
                    const currentLine = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                    
                    let obj = {};
                    headers.forEach((header, index) => {
                        obj[header] = currentLine[index] || '';
                    });
                    
                    if (obj.name) {
                        obj.id = obj.id || i;
                        medicalData.push(obj);
                    }
                }

                if (medicalData.length === 0) {
                    grid.innerHTML = `<div class="col-span-full text-center text-amber-600 p-6 bg-amber-50 rounded-xl border border-amber-200">تم الاتصال، ولكن تأكد من كتابة العناوين بالإنجليزية (id, name, type, specialty, address, phone, hours) في السطر الأول رقم 1.</div>`;
                    return;
                }

                renderDirectory(medicalData);
                updateStats();

            } catch (error) {
                console.error(error);
                grid.innerHTML = `
                    <div class="col-span-full text-center text-red-600 p-6 bg-red-50 rounded-xl border border-red-200">
                        <i class="fas fa-exclamation-triangle text-2xl mb-2"></i>
                        <p class="font-bold">فشل الاتصال بجدول البيانات السحابي</p>
                        <p class="text-xs text-gray-500 mt-2">تأكد 100% أنك قمت بالدخول لجدول جوجل شيت -> مشاركة -> تغيير الصلاحية إلى "أي شخص لديه الرابط يمكنه العرض (Viewer)".</p>
                    </div>
                `;
            }
        }

        function updateStats() {
            const docs = medicalData.filter(item => item.type === 'doctor').length;
            const clinics = medicalData.filter(item => item.type === 'clinic').length;
            document.querySelector('.count-doctors').innerText = docs;
            document.querySelector('.count-clinics').innerText = clinics;
        }

        function renderDirectory(data) {
            const grid = document.getElementById('directoryGrid');
            grid.innerHTML = '';
            
            data.forEach(item => {
                const isDoctor = item.type === 'doctor';
                const badgeClass = isDoctor ? 'badge-doctor' : 'badge-clinic';
                const badgeText = isDoctor ? 'طبيب تخصصي' : 'مركز طبي';
                
                grid.innerHTML += `
                    <div class="card p-5 cursor-pointer flex flex-col justify-between" onclick="openModal(${item.id})">
                        <div>
                            <div class="flex justify-between items-center mb-3">
                                <span class="badge ${badgeClass} text-xs px-2.5 py-1 rounded-full font-semibold">${badgeText}</span>
                            </div>
                            <h3 class="text-lg font-bold text-gray-800 mb-1">${item.name}</h3>
                            <p class="text-xs text-emerald-700 font-medium mb-4">${item.specialty || 'تخصص عام'}</p>
                            <p class="text-xs text-gray-500 mb-1"><i class="fas fa-map-marker-alt text-gray-400 ml-1"></i> ${item.address || 'الرحيبة'}</p>
                        </div>
                        <button class="w-full mt-4 bg-gray-50 border py-2 rounded-xl text-xs font-semibold text-gray-600">عرض التفاصيل</button>
                    </div>
